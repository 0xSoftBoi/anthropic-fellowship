# Provider-agnostic Model Access

## Action

Route every model call through `agents/llm.py` (`llm.completion(...)`, LiteLLM) and select the model with `BENCH_MODEL`. Never call a provider SDK directly.

## Evidence

- `agents/llm.py` is the single completion path; all analyzers import it.

