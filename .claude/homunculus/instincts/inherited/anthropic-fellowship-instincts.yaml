# Imports

## Action

Use absolute, package-rooted imports — `from agents.llm import completion`, `from benchmarks.bridge_contracts_real import load_real_contracts`. Do not use relative (`from ..`) imports.

## Evidence

- ~35 absolute `from agents` / `from benchmarks` imports; zero relative `from ..` imports.

