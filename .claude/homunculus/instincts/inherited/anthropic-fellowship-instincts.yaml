# Commit Format

## Action

Write a concise, descriptive message; a `type:` prefix (`docs:`, `feat:`, `fix:`) is common. Add a `Co-Authored-By:` trailer for agent commits.

## Evidence

- Recent history mixes type-prefixed and freeform messages.
