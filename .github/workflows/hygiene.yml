name: hygiene

on: [push, pull_request]

jobs:
  no-duplicate-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject accidental "<name> 2.<ext>" duplicate files
        run: |
          dups=$(git ls-files | grep -E ' 2(\.[^/]*)?$' || true)
          if [ -n "$dups" ]; then
            echo "::error::Found accidental duplicate files (likely Finder copies):"
            echo "$dups"
            exit 1
          fi
          echo "No duplicate ' 2' files. ✓"
